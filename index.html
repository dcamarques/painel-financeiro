<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boonus TV - Monitor de Mercado Pro</title>
    <style>
        :root { --neon-green: #00ff88; --dark-bg: #050505; --panel-bg: #111; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Cabeçalho */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; background: var(--panel-bg); border-bottom: 4px solid var(--neon-green); }
        .logo img { height: 55px; width: auto; }
        .clocks-container { display: flex; gap: 25px; }
        .clock-box { text-align: center; min-width: 90px; }
        .label { font-size: 0.8rem; color: #FFFFFF; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        .time { font-size: 2rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        #br-time { color: var(--neon-green); }

        /* Esteira B3 */
        .ticker-container { width: 100%; overflow: hidden; background: #1a1a1a; padding: 8px 0; border-bottom: 1px solid #333; }
        .ticker-content { display: inline-flex; animation: marquee 50s linear infinite; white-space: nowrap; }
        .stock-item { display: inline-flex; align-items: center; margin: 0 30px; font-size: 1.6rem; font-weight: 600; }
        .up { color: var(--neon-green); } .down { color: #ff4444; }

        /* Estrutura Principal: Conteúdo | Barra Lateral */
        .main-container { flex: 1; display: flex; overflow: hidden; }
        
        /* Lado Esquerdo: Notícias e Publi */
        .content-area { flex: 3; position: relative; display: flex; justify-content: center; align-items: center; border-right: 2px solid #222; }
        .news-wrapper { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 40px; width: 100%; transition: opacity 1s; }
        .news-image { width: 80%; max-height: 350px; border-radius: 8px; object-fit: cover; margin-bottom: 20px; display: none; }
        #news-title { font-size: 2.8rem; font-weight: bold; line-height: 1.2; }

        /* Lado Direito: Barra Lateral de Inteligência */
        .sidebar { flex: 1; background: #0a0a0a; display: flex; flex-direction: column; padding: 20px; gap: 20px; box-sizing: border-box; }
        .side-panel { background: #151515; border-radius: 10px; padding: 15px; border-left: 3px solid var(--neon-green); }
        .side-title { font-size: 0.9rem; color: var(--neon-green); text-transform: uppercase; font-weight: bold; margin-bottom: 10px; display: block; }
        
        /* Indicadores */
        .indicator-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.2rem; }
        .ind-val { font-weight: bold; color: #fff; }

        /* Agenda */
        .event-item { font-size: 1rem; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .event-time { color: var(--neon-green); font-weight: bold; margin-right: 8px; }

        /* QR Code */
        .qr-section { margin-top: auto; text-align: center; padding-bottom: 10px; }
        .qr-box { background: white; padding: 10px; border-radius: 8px; width: 140px; height: 140px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 0.7rem; }
        .qr-text { font-size: 0.9rem; font-weight: bold; color: var(--neon-green); }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        /* Responsividade Celular */
        @media (max-width: 1024px) {
            .main-container { flex-direction: column; overflow-y: auto; }
            .sidebar { flex: none; width: 100%; order: 2; }
            .content-area { flex: none; height: 500px; border-right: none; border-bottom: 2px solid #222; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><img src="logo.png" alt="Boonus Logo"></div>
        <div class="clocks-container">
            <div class="clock-box"><div class="label">Brasília</div><div id="br-time" class="time">00:00</div></div>
            <div class="clock-box"><div class="label">NY</div><div id="ny-time" class="time">00:00</div></div>
            <div class="clock-box"><div class="label">London</div><div id="ld-time" class="time">00:00</div></div>
        </div>
    </div>

    <div class="ticker-container">
        <div id="stock-ticker" class="ticker-content"><span class="stock-item">CONECTANDO B3...</span></div>
    </div>

    <div class="main-container">
        <div class="content-area">
            <div id="news-block" class="news-wrapper">
                <img id="news-img" class="news-image" src="" alt="Thumbnail">
                <div id="news-source" style="color:var(--neon-green); font-weight: bold; margin-bottom: 10px;">CARREGANDO</div>
                <div id="news-title">Sincronizando mercado...</div>
            </div>
            <div id="publi-block" style="display:none; width:100%; height:100%;">
                <img id="publi-img" src="" style="width:100%; height:100%; object-fit: contain;">
            </div>
        </div>

        <div class="sidebar">
            <div class="side-panel">
                <span class="side-title">Indicadores Macro</span>
                <div class="indicator-row"><span>SELIC</span><span class="ind-val">10,75%</span></div>
                <div class="indicator-row"><span>IPCA (12m)</span><span class="ind-val">4,50%</span></div>
                <div class="indicator-row"><span>CDI</span><span class="ind-val">10,65%</span></div>
            </div>

            <div class="side-panel">
                <span class="side-title">Agenda do Dia</span>
                <div class="event-item"><span class="event-time">10:00</span><span>IPCA Mensal (IBGE)</span></div>
                <div class="event-item"><span class="event-time">15:30</span><span>Discurso FED (EUA)</span></div>
            </div>

            <div class="qr-section">
                <div class="qr-box">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=https://tv.boonus.app.br" alt="QR Code" style="width:100%">
                </div>
                <span class="qr-text">DÚVIDAS? FALE COM UM CONSULTOR</span>
            </div>
        </div>
    </div>

    <script>
        // Funções de Relógio e API (Mantidas as que já funcionam)
        function updateClocks() {
            const now = new Date();
            const opt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('br-time').innerText = now.toLocaleTimeString('pt-BR', opt);
            document.getElementById('ny-time').innerText = now.toLocaleTimeString('en-US', { ...opt, timeZone: 'America/New_York' });
            document.getElementById('ld-time').innerText = now.toLocaleTimeString('en-GB', { ...opt, timeZone: 'Europe/London' });
        }
        setInterval(updateClocks, 1000);
        updateClocks();

        // Lógica de Troca de Notícias e Publi (90s / 15s)
        const timeNews = 90000;
        const timePubli = 15000;
        let currentPubliIndex = 0;
        const publiImages = ['publi1.png', 'publi2.png'];

        function toggleDisplay() {
            const news = document.getElementById('news-block');
            const publi = document.getElementById('publi-block');
            const isShowingNews = news.style.display !== 'none';

            if (isShowingNews) {
                news.style.opacity = 0;
                setTimeout(() => {
                    news.style.display = 'none';
                    publi.style.display = 'block';
                    document.getElementById('publi-img').src = publiImages[currentPubliIndex];
                    publi.style.opacity = 1;
                }, 1000);
                setTimeout(toggleDisplay, timePubli);
                currentPubliIndex = (currentPubliIndex + 1) % publiImages.length;
            } else {
                publi.style.opacity = 0;
                setTimeout(() => {
                    publi.style.display = 'none';
                    news.style.display = 'flex';
                    news.style.opacity = 1;
                }, 1000);
                setTimeout(toggleDisplay, timeNews);
            }
        }
        setTimeout(toggleDisplay, timeNews);

        // Fetch das Notícias (B3, InfoMoney, etc)
        async function fetchNews() {
            const feeds = [
                { name: "B3 - NOTÍCIAS", url: "https://www.b3.com.br/pt_br/noticias/rss" },
                { name: "INFO MONEY", url: "https://www.infomoney.com.br/feed/" }
            ];
            let newsList = [];
            for (const f of feeds) {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(f.url)}`);
                    const data = await res.json();
                    newsList.push(...data.items.map(i => ({ ...i, source: f.name })));
                } catch(e) {}
            }
            let idx = 0;
            setInterval(() => {
                if (newsList.length) {
                    const item = newsList[idx];
                    document.getElementById('news-source').innerText = "FONTE: " + item.source;
                    document.getElementById('news-title').innerText = item.title;
                    const img = document.getElementById('news-img');
                    if (item.thumbnail) { img.src = item.thumbnail; img.style.display = 'block'; }
                    else { img.style.display = 'none'; }
                    idx = (idx + 1) % newsList.length;
                }
            }, 12000);
        }
        fetchNews();

        // Ticker B3
        async function fetchTicker() {
            try {
                const res = await fetch('https://brapi.dev/api/quote/list?limit=15');
                const data = await res.json();
                let html = '';
                data.stocks.forEach(s => {
                    const up = s.changePercent >= 0;
                    html += `<span class="stock-item"><span>${s.stock}</span> <span class="${up?'up':'down'}">${up?'▲':'▼'} ${s.changePercent.toFixed(2)}%</span></span>`;
                });
                document.getElementById('stock-ticker').innerHTML = html + html;
            } catch(e) {}
        }
        fetchTicker();
        setInterval(fetchTicker, 600000);
    </script>
</body>
</html>
