<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boonus TV - Terminal Corrigido</title>
    <style>
        :root { --neon-green: #00ff88; --dark-bg: #050505; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* Ticker superior */
        .ticker-container { width: 100%; overflow: hidden; background: #1a1a1a; padding: 8px 0; border-bottom: 1px solid #333; }
        .ticker-content { display: inline-flex; animation: marquee 60s linear infinite; white-space: nowrap; }
        .stock-item { display: inline-flex; align-items: center; margin: 0 25px; font-size: 1.4rem; font-weight: bold; }
        .up { color: var(--neon-green); } .down { color: #ff4444; }
        .tag-status { font-size: 0.6rem; background: #444; padding: 2px 5px; border-radius: 3px; margin-right: 8px; vertical-align: middle; }

        /* Blocos de Conteúdo */
        .main-container { flex: 1; display: flex; }
        .content-area { flex: 4; position: relative; display: flex; justify-content: center; align-items: center; }
        .display-block { position: absolute; width: 90%; height: 90%; display: none; opacity: 0; transition: opacity 0.8s; flex-direction: column; justify-content: center; align-items: center; text-align: center; }

        /* Grade de Moedas */
        .coins-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 85%; text-align: left; }
        .coin-card { background: #111; padding: 25px; border-radius: 15px; border-left: 5px solid var(--neon-green); }
        .coin-card h3 { color: var(--neon-green); margin: 0 0 10px 0; font-size: 0.9rem; text-transform: uppercase; }
        .coin-val { font-size: 2.5rem; font-weight: bold; display: block; }
        .coin-var { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <div class="ticker-container">
        <div id="stock-ticker" class="ticker-content">Sincronizando ativos B3...</div>
    </div>

    <div class="main-container">
        <div class="content-area">
            <div id="block-coins" class="display-block" style="display: flex; opacity: 1;">
                <h2 style="color:var(--neon-green); margin-bottom:30px;">CÂMBIO GLOBAL <span id="market-label" style="font-size:1rem; color:#888;"></span></h2>
                <div class="coins-grid">
                    <div class="coin-card"><h3>Dólar Americano</h3><div id="usd-val" class="coin-val">R$ ---</div><div id="usd-var" class="coin-var">---</div></div>
                    <div class="coin-card"><h3>Euro</h3><div id="eur-val" class="coin-val">R$ ---</div><div id="eur-var" class="coin-var">---</div></div>
                    <div class="coin-card"><h3>Iene Japonês</h3><div id="jpy-val" class="coin-val">R$ ---</div><div id="jpy-var" class="coin-var">---</div></div>
                    <div class="coin-card"><h3>Libra Esterlina</h3><div id="gbp-val" class="coin-val">R$ ---</div><div id="gbp-var" class="coin-var">---</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateMarketData() {
            const now = new Date();
            const day = now.getDay();
            const hour = now.getHours();
            const isMarketOpen = (day >= 1 && day <= 5) && (hour >= 10 && hour < 18);
            
            document.getElementById('market-label').innerText = isMarketOpen ? "(AO VIVO)" : "(FECHAMENTO OFICIAL)";

            try {
                // Moedas e Índices via API Brapi (Pública com fallback)
                const res = await fetch('https://brapi.dev/api/quote/USDBRL,EURBRL,JPYBRL,GBPBRL,^BVSP,^GSPC,^IXIC');
                const data = await res.json();

                if (data.results) {
                    data.results.forEach(item => {
                        const val = item.regularMarketPrice;
                        const variation = item.regularMarketChangePercent;
                        const isUp = variation >= 0;

                        if (item.symbol === 'USDBRL') fillCoin('usd', val, variation);
                        if (item.symbol === 'EURBRL') fillCoin('eur', val, variation);
                        if (item.symbol === 'JPYBRL') fillCoin('jpy', val, variation);
                        if (item.symbol === 'GBPBRL') fillCoin('gbp', val, variation);
                    });
                }

                // Ticker da B3 (Top 10 Altas e Baixas)
                const resB3 = await fetch('https://brapi.dev/api/quote/list?sortBy=change&sortOrder=desc');
                const dataB3 = await resB3.json();
                
                const actionRegex = /^[A-Z]{4}[3456]$/;
                const actions = dataB3.stocks.filter(s => actionRegex.test(s.stock));
                
                const top10 = actions.slice(0, 10);
                const bot10 = actions.slice(-10).reverse();
                
                let html = '';
                const statusTag = isMarketOpen ? '' : '<span class="tag-status">FECHAMENTO</span>';

                top10.concat(bot10).forEach(s => {
                    const color = s.change >= 0 ? 'up' : 'down';
                    const icon = s.change >= 0 ? '▲' : '▼';
                    html += `<span class="stock-item">${statusTag} ${s.stock} <span class="${color}">${icon} ${s.change.toFixed(2)}%</span></span>`;
                });
                document.getElementById('stock-ticker').innerHTML = html + html;

            } catch (error) {
                console.error("Erro ao carregar dados:", error);
            }
        }

        function fillCoin(id, val, variation) {
            document.getElementById(`${id}-val`).innerText = `R$ ${val.toFixed(2)}`;
            const varEl = document.getElementById(`${id}-var`);
            varEl.innerText = `${variation >= 0 ? '▲' : '▼'} ${variation.toFixed(2)}%`;
            varEl.style.color = variation >= 0 ? 'var(--neon-green)' : '#ff4444';
        }

        // Inicialização e Intervalo de 5 minutos (300000ms)
        updateMarketData();
        setInterval(updateMarketData, 300000);
    </script>
</body>
</html>
