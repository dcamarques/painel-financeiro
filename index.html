<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boonus TV - Terminal Financeiro</title>
    <style>
        :root { --neon-green: #00ff88; --dark-bg: #050505; --panel-bg: #111; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; background: var(--panel-bg); border-bottom: 4px solid var(--neon-green); z-index: 10; }
        .logo img { height: 40px; width: auto; }
        .clocks-container { display: flex; gap: 15px; }
        .clock-box { text-align: center; min-width: 85px; }
        .label { font-size: 0.65rem; color: #FFFFFF; text-transform: uppercase; font-weight: bold; opacity: 0.8; }
        .time { font-size: 1.6rem; font-weight: bold; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
        #br-time { color: var(--neon-green); }

        .ticker-container { width: 100%; overflow: hidden; background: #1a1a1a; padding: 6px 0; border-bottom: 1px solid #333; min-height: 35px; }
        .ticker-content { display: inline-flex; animation: marquee 60s linear infinite; white-space: nowrap; }
        .stock-item { display: inline-flex; align-items: center; margin: 0 25px; font-size: 1.5rem; font-weight: 600; }
        .up { color: var(--neon-green); } .down { color: #ff4444; }

        .main-container { flex: 1; display: flex; overflow: hidden; }
        .content-area { flex: 4; position: relative; display: flex; justify-content: center; align-items: center; background: var(--dark-bg); }
        .display-block { position: absolute; width: 100%; height: 100%; display: none; opacity: 0; transition: opacity 0.8s; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; text-align: center; }

        .macro-grid, .coins-grid, .agenda-grid, .opportunities-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 95%; text-align: left; }
        .card-column { display: flex; flex-direction: column; gap: 15px; }
        .info-card { background: #111; padding: 15px 20px; border-radius: 12px; border-left: 5px solid var(--neon-green); position: relative; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        .info-card h3 { color: var(--neon-green); margin: 0 0 5px 0; font-size: 0.85rem; text-transform: uppercase; }
        .info-val { font-size: 1.5rem; font-weight: bold; display: block; white-space: normal; }
        .info-sub { font-size: 0.95rem; font-weight: bold; margin-top: 3px; color: #888; }

        .card-with-logo { display: flex; align-items: center; gap: 15px; }
        .asset-logo { width: 60px; height: 60px; object-fit: contain; background: #fff; border-radius: 8px; padding: 5px; flex-shrink: 0; }

        #news-title { font-size: 2.1rem; font-weight: bold; line-height: 1.2; max-width: 90%; margin-top: 10px; }
        .news-image { width: auto; max-width: 80%; max-height: 45vh; border-radius: 8px; object-fit: contain; margin-bottom: 10px; border: 2px solid #333; }
        
        .sidebar-qr { flex: 1.2; background: #0a0a0a; display: flex; flex-direction: column; justify-content: space-between; align-items: center; border-left: 2px solid #1a1a1a; padding: 25px 20px 10px 20px; box-sizing: border-box; }
        .qr-section { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
        .qr-box { background: white; padding: 10px; border-radius: 10px; width: 150px; height: 150px; margin-bottom: 15px; }
        .qr-text { font-size: 1rem; font-weight: bold; color: var(--neon-green); text-align: center; line-height: 1.2; }
        .version-tag { font-size: 0.65rem; color: #444; align-self: flex-end; }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><img src="logo.png" alt="Boonus Logo" onerror="this.style.display='none'"></div>
        <div class="clocks-container">
            <div class="clock-box"><div class="label">Brasília</div><div id="br-time" class="time">--:--:--</div></div>
            <div class="clock-box"><div class="label">New York</div><div id="ny-time" class="time">--:--:--</div></div>
            <div class="clock-box"><div class="label">London</div><div id="ld-time" class="time">--:--:--</div></div>
            <div class="clock-box"><div class="label">Tokyo</div><div id="tk-time" class="time">--:--:--</div></div>
        </div>
    </div>

    <div class="ticker-container">
        <div id="stock-ticker" class="ticker-content">Sincronizando mercados globais...</div>
    </div>

    <div class="main-container">
        <div class="content-area">
            <div id="block-news" class="display-block" style="display: flex; opacity: 1;">
                <img id="news-img" class="news-image" src="" style="display:none;">
                <div id="news-source" style="color:var(--neon-green); font-weight:bold; text-transform:uppercase; font-size: 0.9rem; letter-spacing: 1px;">Fonte</div>
                <div id="news-title">Buscando as últimas do mercado...</div>
            </div>

            <div id="block-opps" class="display-block">
                <h2 style="color:var(--neon-green); margin-bottom:20px;">OPORTUNIDADES DO DIA</h2>
                <div id="opps-container" class="opportunities-grid"></div>
            </div>

            <div id="block-publi" class="display-block">
                <img id="publi-img" src="" style="width:100%; height:100%; object-fit: contain;" onerror="this.style.display='none'">
            </div>

            <div id="block-macro" class="display-block">
                <h2 style="color:var(--neon-green); margin-bottom:20px;">INDICADORES MACRO &amp; ÍNDICES</h2>
                <div class="macro-grid">
                    <div class="card-column">
                        <div class="info-card"><h3>SELIC (META)</h3><div class="info-val">14,50%</div></div>
