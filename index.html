<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boonus TV - Global Market Monitor</title>
    <style>
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* Cabeçalho Ajustado para 4 Relógios */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 30px; 
            background: #111; 
            border-bottom: 4px solid #00ff88;
        }
        .logo img { 
            height: 65px; 
            width: auto; 
        }
        .clocks-container {
            display: flex;
            gap: 40px;
        }
        .clock-box { text-align: center; }
        .label { 
            font-size: 0.7rem; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 2px;
        }
        .time { 
            font-size: 2.2rem; 
            font-weight: bold; 
            font-variant-numeric: tabular-nums; 
        }
        #br-time { color: #00ff88; }
        #ny-time { color: #55aaff; }
        #ld-time { color: #ffcc00; }
        #sh-time { color: #ff5555; }

        /* Esteira de Ações */
        .ticker-container { 
            width: 100%; 
            overflow: hidden; 
            background: #1a1a1a; 
            padding: 12px 0; 
            border-bottom: 1px solid #333; 
        }
        .ticker-content { 
            display: inline-flex; 
            animation: marquee 50s linear infinite; 
            white-space: nowrap; 
        }
        .stock-item { 
            display: inline-flex; 
            align-items: center; 
            margin: 0 40px; 
            font-size: 2rem; 
            font-weight: 600; 
        }
        .up { color: #00ff88; } 
        .down { color: #ff4444; }

        /* Área Central de Notícias */
        .news-container {
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center; 
            padding: 30px; 
            text-align: center; 
            background: radial-gradient(circle, #111 0%, #050505 100%);
        }
        #news-source { 
            font-size: 1.1rem; 
            color: #00ff88; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 15px; 
        }
        #news-title { 
            font-size: 3.2rem; 
            font-weight: bold; 
            line-height: 1.2; 
            max-width: 85%; 
        }

        @keyframes marquee { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(-50%); } 
        }
        
        .footer { 
            padding: 8px; 
            background: #000; 
            color: #444; 
            font-size: 0.75rem; 
            text-align: center; 
            border-top: 1px solid #111; 
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <img src="logo.png" alt="Boonus Logo">
        </div>
        
        <div class="clocks-container">
            <div class="clock-box"> 
                <div class="label">Brasília</div> 
                <div id="br-time" class="time">00:00</div> 
            </div>
            <div class="clock-box"> 
                <div class="label">New York</div> 
                <div id="ny-time" class="time">00:00</div> 
            </div>
            <div class="clock-box"> 
                <div class="label">London</div> 
                <div id="ld-time" class="time">00:00</div> 
            </div>
            <div class="clock-box"> 
                <div class="label">Shanghai</div> 
                <div id="sh-time" class="time">00:00</div> 
            </div>
        </div>
    </div>

    <div class="ticker-container">
        <div id="stock-ticker" class="ticker-content">
            <span class="stock-item">CONECTANDO AO MERCADO GLOBAL...</span>
        </div>
    </div>

    <div class="news-container">
        <div id="news-source">INFO MONEY</div>
        <div id="news-title">Carregando manchetes do mercado...</div>
    </div>

    <div class="footer">Monitor Multi-Mercado • tv.boonus.app.br • Fontes: Brapi & InfoMoney</div>

    <script>
        function updateClocks() {
            const now = new Date();
            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            
            document.getElementById('br-time').innerText = now.toLocaleTimeString('pt-BR', options);
            document.getElementById('ny-time').innerText = now.toLocaleTimeString('en-US', { ...options, timeZone: 'America/New_York' });
            document.getElementById('ld-time').innerText = now.toLocaleTimeString('en-GB', { ...options, timeZone: 'Europe/London' });
            document.getElementById('sh-time').innerText = now.toLocaleTimeString('zh-CN', { ...options, timeZone: 'Asia/Shanghai' });
        }
        setInterval(updateClocks, 1000);
        updateClocks();

        let newsList = [];
        let newsIndex = 0;

        async function fetchNews() {
            try {
                const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.infomoney.com.br%2Ffeed%2F');
                const data = await response.json();
                newsList = data.items;
                displayNextNews();
            } catch (e) { console.error(e); }
        }

        function displayNextNews() {
            if (newsList.length === 0) return;
            const titleElement = document.getElementById('news-title');
            titleElement.innerText = newsList[newsIndex].title;
            newsIndex = (newsIndex + 1) % newsList.length;
        }

        setInterval(displayNextNews, 12000);
        fetchNews();

        async function fetchMarketData() {
            try {
                const response = await fetch('https://brapi.dev/api/quote/list?sortBy=changePercent&sortOrder=desc&limit=10');
                const data = await response.json();
                const items = [...data.stocks.slice(0, 10), ...data.stocks.slice(-10).reverse()];
                let html = '';
                [...items, ...items].forEach(stock => {
                    const isUp = stock.changePercent >= 0;
                    html += `<span class="stock-item"><span style="color:#eee;margin-right:15px">${stock.stock}</span><span class="${isUp?'up':'down'}">${isUp?'▲':'▼'} ${stock.changePercent.toFixed(2)}%</span></span>`;
                });
                document.getElementById('stock-ticker').innerHTML = html;
            } catch (e) { document.getElementById('stock-ticker').innerHTML = "Mercado em Pausa"; }
        }
        fetchMarketData();
        setInterval(fetchMarketData, 900000);
    </script>
</body>
</html>
