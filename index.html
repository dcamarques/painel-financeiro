<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boonus TV - Monitor Adaptativo</title>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Cabeçalho Responsivo com Fontes Maiores */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #111; border-bottom: 4px solid #00ff88; flex-wrap: wrap; }
        .logo img { height: 60px; width: auto; }
        .clocks-container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .clock-box { text-align: center; min-width: 100px; }
        
        /* Aumento do tamanho das etiquetas das cidades */
        .label { font-size: 0.9rem; color: #FFFFFF; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; margin-bottom: 4px; }
        
        /* Aumento do tamanho dos números do relógio */
        .time { font-size: 2.2rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        
        #br-time { color: #00ff88; } #ny-time { color: #55aaff; } #ld-time { color: #ffcc00; } #sh-time { color: #ff5555; }

        /* Esteira B3 */
        .ticker-container { width: 100%; overflow: hidden; background: #1a1a1a; padding: 12px 0; border-bottom: 1px solid #333; }
        .ticker-content { display: inline-flex; animation: marquee 50s linear infinite; white-space: nowrap; }
        .stock-item { display: inline-flex; align-items: center; margin: 0 30px; font-size: 1.8rem; font-weight: 600; }
        .up { color: #00ff88; } .down { color: #ff4444; }

        /* Área Central Adaptativa */
        .main-display { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #050505; overflow-y: auto; }
        .news-wrapper { display: flex; align-items: center; justify-content: center; padding: 30px; gap: 40px; position: absolute; width: 100%; transition: opacity 1s; box-sizing: border-box; }
        .news-image { width: 40%; max-height: 450px; border-radius: 8px; object-fit: cover; border: 2px solid #222; display: none; }
        .news-text-content { flex: 1; text-align: left; }
        #news-source { font-size: 1.2rem; color: #00ff88; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; font-weight: bold; }
        #news-title { font-size: 2.8rem; font-weight: bold; line-height: 1.2; }

        /* AJUSTES PARA DISPOSITIVOS MÓVEIS */
        @media (max-width: 768px) {
            .header { justify-content: center; gap: 20px; padding: 15px; }
            .logo img { height: 45px; }
            .clocks-container { gap: 15px; }
            .label { font-size: 0.75rem; }
            .time { font-size: 1.6rem; } /* Relógio ainda legível no celular */
            .news-wrapper { flex-direction: column; text-align: center; position: relative; padding-top: 40px; }
            .news-image { width: 95%; height: 220px; }
            .news-text-content { text-align: center; }
            #news-title { font-size: 1.8rem; }
            .stock-item { font-size: 1.3rem; }
        }

        .publi-wrapper { position: absolute; width: 100%; height: 100%; display: none; opacity: 0; transition: opacity 1s; }
        .publi-wrapper img { width: 100%; height: 100%; object-fit: contain; }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .footer { padding: 8px; background: #000; color: #444; font-size: 0.75rem; text-align: center; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><img src="logo.png" alt="Boonus Logo"></div>
        <div class="clocks-container">
            <div class="clock-box"><div class="label">Brasília</div><div id="br-time" class="time">00:00</div></div>
            <div class="clock-box"><div class="label">NY</div><div id="ny-time" class="time">00:00</div></div>
            <div class="clock-box"><div class="label">London</div><div id="ld-time" class="time">00:00</div></div>
            <div class="clock-box"><div class="label">Shanghai</div><div id="sh-time" class="time">00:00</div></div>
        </div>
    </div>

    <div class="ticker-container">
        <div id="stock-ticker" class="ticker-content"><span class="stock-item">CONECTANDO B3...</span></div>
    </div>

    <div class="main-display">
        <div id="news-block" class="news-wrapper">
            <img id="news-img" class="news-image" src="" alt="Thumbnail">
            <div class="news-text-content">
                <div id="news-source">FONTES</div>
                <div id="news-title">Sincronizando...</div>
            </div>
        </div>
        <div id="publi-block" class="publi-wrapper">
            <img id="publi-img" src="" alt="Publicidade">
        </div>
    </div>

    <div class="footer">Monitor Multi-Mercado • tv.boonus.app.br</div>

    <script>
        function updateClocks() {
            const now = new Date();
            const opt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('br-time').innerText = now.toLocaleTimeString('pt-BR', opt);
            document.getElementById('ny-time').innerText = now.toLocaleTimeString('en-US', { ...opt, timeZone: 'America/New_York' });
            document.getElementById('ld-time').innerText = now.toLocaleTimeString('en-GB', { ...opt, timeZone: 'Europe/London' });
            document.getElementById('sh-time').innerText = now.toLocaleTimeString('zh-CN', { ...opt, timeZone: 'Asia/Shanghai' });
        }
        setInterval(updateClocks, 1000);
        updateClocks();

        const publiImages = ['publi1.png', 'publi2.png', 'publi3.png'];
        let currentPubliIndex = 0;
        const timeNews = 90000; 
        const timePubli = 15000; 

        function toggleDisplay(showPubli) {
            const news = document.getElementById('news-block');
            const publi = document.getElementById('publi-block');
            const img = document.getElementById('publi-img');

            if (showPubli) {
                img.src = publiImages[currentPubliIndex] + '?t=' + new Date().getTime();
                news.style.opacity = 0;
                setTimeout(() => {
                    news.style.display = 'none';
                    publi.style.display = 'flex';
                    setTimeout(() => { publi.style.opacity = 1; }, 50);
                }, 1000);
                setTimeout(() => toggleDisplay(false), timePubli);
                currentPubliIndex = (currentPubliIndex + 1) % publiImages.length;
            } else {
                publi.style.opacity = 0;
                setTimeout(() => {
                    publi.style.display = 'none';
                    news.style.display = 'flex';
                    setTimeout(() => { news.style.opacity = 1; }, 50);
                }, 1000);
                setTimeout(() => toggleDisplay(true), timeNews);
            }
        }
        setTimeout(() => toggleDisplay(true), timeNews);

        const feeds = [
            { name: "B3 - NOTÍCIAS", url: "https://www.b3.com.br/pt_br/noticias/rss" },
            { name: "INFO MONEY", url: "https://www.infomoney.com.br/feed/" },
            { name: "VALOR", url: "https://valor.globo.com/rss/valor/" },
            { name: "EXAME", url: "https://exame.com/feed/" }
        ];
        let combinedNews = [];
        let currentIndex = 0;

        async function fetchAllNews() {
            combinedNews = [];
            for (const feed of feeds) {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                    const data = await res.json();
                    combinedNews.push(...data.items.map(i => ({ 
                        ...i, 
                        sourceName: feed.name,
                        thumb: i.thumbnail || i.enclosure?.link || "" 
                    })));
                } catch (e) {}
            }
            combinedNews.sort(() => Math.random() - 0.5);
            if (combinedNews.length > 0) displayNextNews();
        }

        function displayNextNews() {
            if (combinedNews.length === 0) return;
            const sourceEl = document.getElementById('news-source');
            const titleEl = document.getElementById('news-title');
            const imgEl = document.getElementById('news-img');
            const wrapperEl = document.getElementById('news-block');

            if (wrapperEl.style.display !== 'none') {
                wrapperEl.style.opacity = 0;
                setTimeout(() => {
                    const news = combinedNews[currentIndex];
                    sourceEl.innerText = "FONTE: " + news.sourceName;
                    titleEl.innerText = news.title;
                    if (news.thumb) {
                        imgEl.src = news.thumb;
                        imgEl.style.display = 'block';
                    } else {
                        imgEl.style.display = 'none';
                    }
                    wrapperEl.style.opacity = 1;
                    currentIndex = (currentIndex + 1) % combinedNews.length;
                }, 500);
            }
        }
        setInterval(displayNextNews, 12000);
        fetchAllNews();
        setInterval(fetchAllNews, 3600000);

        async function fetchMarketData() {
            try {
                const res = await fetch('https://brapi.dev/api/quote/list?sortBy=changePercent&sortOrder=desc&limit=10');
                const data = await res.json();
                const items = [...data.stocks.slice(0, 10), ...data.stocks.slice(-10).reverse()];
                let html = '';
                [...items, ...items].forEach(s => {
                    const isUp = s.changePercent >= 0;
                    html += `<span class="stock-item"><span style="color:#eee;margin-right:15px">${s.stock}</span><span class="${isUp?'up':'down'}">${isUp?'▲':'▼'} ${s.changePercent.toFixed(2)}%</span></span>`;
                });
                document.getElementById('stock-ticker').innerHTML = html;
            } catch (e) {}
        }
        fetchMarketData();
        setInterval(fetchMarketData, 900000);
    </script>
</body>
</html>
