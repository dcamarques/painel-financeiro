<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boonus TV - Mesa de Operações</title>
    <style>
        :root { --neon-color: #00ff88; --dark-bg: #050505; --panel-bg: #111; }
        body { background: var(--dark-bg); color: white; font-family: sans-serif; overflow: hidden; margin: 0; height: 100vh; }
        #debug-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: red; z-index: 9999; display: none; padding: 20px; font-family: monospace; }
        /* Mantemos o layout anterior... */
    </style>
</head>
<body>
    <div id="debug-layer">
        <h2>ERRO CRÍTICO NO CARREGAMENTO:</h2>
        <pre id="error-details"></pre>
        <p>Aperte F12 para ver o Console.</p>
    </div>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('debug-layer').style.display = 'block';
            document.getElementById('error-details').innerText = `Mensagem: ${message}\nLinha: ${lineno}\nErro: ${error}`;
        };

    </script>
